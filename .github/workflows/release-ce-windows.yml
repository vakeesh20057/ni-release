################################################################################
#  NeuralInverse Community Edition — Windows Release (GitHub Actions)
#
#  Windows x64   -> .exe  .msi  .zip   (Intel / AMD 64-bit)
#  Windows arm64 -> .exe  .msi  .zip   (Surface / Snapdragon)
#
#  Trigger: manual workflow_dispatch only
#
#  Secrets required:
#    AWS_ACCESS_KEY_ID
#    AWS_SECRET_ACCESS_KEY
################################################################################

name: CE Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

env:
  NI_DISPLAY_NAME: "NeuralInverse"
  NI_QUALITY: "stable"

jobs:
  ############################################################################
  #  Build React UI on Ubuntu (avoids Windows path issues with buildreact)
  ############################################################################
  build-react:
    name: Build React UI (Ubuntu)
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: community-edition
          fetch-depth: 1

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libkrb5-dev libsecret-1-dev libx11-dev libxkbfile-dev

      - name: Install dependencies
        run: |
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000
          npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React UI
        run: npm run buildreact

      - name: Upload React build output
        uses: actions/upload-artifact@v4
        with:
          name: react-out
          path: src/vs/workbench/contrib/void/browser/react/out/
          retention-days: 1

  ############################################################################
  #  Windows x64  (.exe + .msi + .zip)
  ############################################################################
  build-windows-x64:
    name: Windows x64 (.exe + .msi + .zip)
    runs-on: windows-2022
    needs: [build-react]
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: community-edition
          fetch-depth: 1

      - name: Set version
        shell: bash
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000
          npm ci --ignore-scripts
          node build/npm/postinstall.js
          npm rebuild @vscode/policy-watcher @vscode/spdlog @vscode/sqlite3 @vscode/deviceid @vscode/windows-mutex @vscode/windows-registry @vscode/windows-process-tree native-keymap native-watchdog native-is-elevated node-pty @parcel/watcher windows-foreground-love kerberos 2>&1 || echo "Some native modules failed to rebuild (non-fatal)"
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download React build output
        uses: actions/download-artifact@v4
        with:
          name: react-out
          path: src/vs/workbench/contrib/void/browser/react/out/

      - name: Compile TypeScript (production)
        run: node_modules\.bin\gulp.cmd compile-build-without-mangling
        env:
          NODE_OPTIONS: "--max-old-space-size=12288"

      - name: Minify (produces out-vscode-min/)
        run: node_modules\.bin\gulp.cmd minify-vscode
        env:
          NODE_OPTIONS: "--max-old-space-size=12288"

      - name: Compile extensions (syntax + language features)
        run: node_modules\.bin\gulp.cmd compile-extensions-build
        env:
          NODE_OPTIONS: "--max-old-space-size=12288"

      - name: Ensure WiX on PATH
        shell: pwsh
        run: |
          $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path "$wix\candle.exe")) {
            $wix = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          }
          if (Test-Path "$wix\candle.exe") {
            echo "$wix" >> $env:GITHUB_PATH
            Write-Host "WiX found: $wix"
          } else {
            Write-Host "::warning::WiX not found -- .msi will be skipped"
          }

      - name: Package Windows x64 (app directory)
        run: node_modules\.bin\gulp.cmd vscode-win32-x64-min-ci
        env:
          VSCODE_QUALITY: ${{ env.NI_QUALITY }}

      - name: Build Inno Setup installer (.exe)
        shell: pwsh
        run: |
          node_modules\.bin\gulp.cmd vscode-win32-x64-inno-updater
          node_modules\.bin\gulp.cmd vscode-win32-x64-system-setup

      - name: Collect artifacts
        shell: pwsh
        run: |
          $version = "${{ env.NI_VERSION }}"
          $name = "${{ env.NI_DISPLAY_NAME }}"
          $releaseDir = ".build\release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $appDir = $null
          foreach ($searchPath in @("..", ".")) {
            $found = Get-ChildItem -Path $searchPath -Depth 2 -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match "^(VSCode|$name)-win32-x64$" } |
              Select-Object -First 1
            if ($found) { $appDir = $found.FullName; break }
          }
          if (-not $appDir) { Write-Host "::error::Could not find win32-x64 app directory"; exit 1 }
          Write-Host "Found app dir: $appDir"

          $zipOut = Join-Path $releaseDir "$name-$version-win32-x64.zip"
          Compress-Archive -Path "$appDir\*" -DestinationPath $zipOut -Force
          Write-Host "zip: $zipOut ($([math]::Round((Get-Item $zipOut).Length/1MB,1)) MB)"

          $setupDir = ".build\win32-x64\system-setup"
          $setupExe = Get-ChildItem -Path $setupDir -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($setupExe) {
            $exeDest = Join-Path $releaseDir "$name-$version-win32-x64.exe"
            Copy-Item $setupExe.FullName $exeDest -Force
            Write-Host "exe: $exeDest ($([math]::Round($setupExe.Length/1MB,1)) MB)"
          } else {
            Write-Host "::warning::Inno Setup .exe not found -- skipping"
          }

      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          $version = "${{ env.NI_VERSION }}"
          $name = "${{ env.NI_DISPLAY_NAME }}"
          $releaseDir = ".build\release"
          $msiDest = Join-Path $releaseDir "$name-$version-win32-x64.msi"

          $appDir = Get-ChildItem -Path "..", "." -Depth 2 -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match "^(VSCode|$name)-win32-x64$" } | Select-Object -First 1
          if (-not $appDir) { Write-Host "::warning::App directory not found -- .msi skipped"; exit 0 }

          $wixOut = ".build\wix-x64"
          New-Item -ItemType Directory -Force -Path $wixOut | Out-Null
          $harvestedWxs = Join-Path $wixOut "NeuralInverseFiles.wxs"
          $msiTmp = Join-Path $wixOut "NeuralInverse.msi"

          & heat dir $appDir.FullName -nologo -srd -gg -sreg -cg NeuralInverseFiles -dr INSTALLFOLDER "-var:var.SourceDir" -out $harvestedWxs
          if ($LASTEXITCODE -ne 0) { Write-Host "::warning::heat failed -- .msi skipped"; exit 0 }
          & candle -nologo -arch x64 "-dProductVersion=$version" "-dSourceDir=$($appDir.FullName)" "build\win32\NeuralInverse.wxs" $harvestedWxs -out "$wixOut\"
          if ($LASTEXITCODE -ne 0) { Write-Host "::warning::candle failed -- .msi skipped"; exit 0 }
          & light -nologo -ext WixUIExtension (Get-ChildItem $wixOut -Filter "*.wixobj").FullName -out $msiTmp -b $appDir.FullName
          if ($LASTEXITCODE -ne 0) { Write-Host "::warning::light failed -- .msi skipped"; exit 0 }

          if (Test-Path $msiTmp) {
            Copy-Item $msiTmp $msiDest -Force
            Write-Host "msi: $msiDest ($([math]::Round((Get-Item $msiDest).Length/1MB,1)) MB)"
          }

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem .build\release\ | Format-Table Name, Length

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: .build/release/
          retention-days: 7

  ############################################################################
  #  Windows arm64  (.exe + .msi + .zip)
  ############################################################################
  build-windows-arm64:
    name: Windows arm64 (.exe + .msi + .zip)
    runs-on: windows-2022
    needs: [build-react]
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: community-edition
          fetch-depth: 1

      - name: Set version
        shell: bash
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000
          npm ci --ignore-scripts
          node build/npm/postinstall.js
          npm rebuild @vscode/policy-watcher @vscode/spdlog @vscode/sqlite3 @vscode/deviceid @vscode/windows-mutex @vscode/windows-registry @vscode/windows-process-tree native-keymap native-watchdog native-is-elevated node-pty @parcel/watcher windows-foreground-love kerberos 2>&1 || echo "Some native modules failed to rebuild (non-fatal)"
        env:
          npm_config_arch: arm64
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download React build output
        uses: actions/download-artifact@v4
        with:
          name: react-out
          path: src/vs/workbench/contrib/void/browser/react/out/

      - name: Compile TypeScript (production)
        run: node_modules\.bin\gulp.cmd compile-build-without-mangling
        env:
          NODE_OPTIONS: "--max-old-space-size=12288"

      - name: Minify (produces out-vscode-min/)
        run: node_modules\.bin\gulp.cmd minify-vscode
        env:
          NODE_OPTIONS: "--max-old-space-size=12288"

      - name: Compile extensions (syntax + language features)
        run: node_modules\.bin\gulp.cmd compile-extensions-build
        env:
          NODE_OPTIONS: "--max-old-space-size=12288"

      - name: Ensure WiX on PATH
        shell: pwsh
        run: |
          $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path "$wix\candle.exe")) {
            $wix = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          }
          if (Test-Path "$wix\candle.exe") {
            echo "$wix" >> $env:GITHUB_PATH
            Write-Host "WiX found: $wix"
          } else {
            Write-Host "::warning::WiX not found -- .msi will be skipped"
          }

      - name: Package Windows arm64 (app directory)
        run: node_modules\.bin\gulp.cmd vscode-win32-arm64-min-ci
        env:
          VSCODE_QUALITY: ${{ env.NI_QUALITY }}
          npm_config_arch: arm64

      - name: Build Inno Setup installer (.exe)
        shell: pwsh
        run: |
          node_modules\.bin\gulp.cmd vscode-win32-arm64-inno-updater
          node_modules\.bin\gulp.cmd vscode-win32-arm64-system-setup

      - name: Collect artifacts
        shell: pwsh
        run: |
          $version = "${{ env.NI_VERSION }}"
          $name = "${{ env.NI_DISPLAY_NAME }}"
          $releaseDir = ".build\release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $appDir = $null
          foreach ($searchPath in @("..", ".")) {
            $found = Get-ChildItem -Path $searchPath -Depth 2 -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match "^(VSCode|$name)-win32-arm64$" } |
              Select-Object -First 1
            if ($found) { $appDir = $found.FullName; break }
          }
          if (-not $appDir) { Write-Host "::error::Could not find win32-arm64 app directory"; exit 1 }
          Write-Host "Found app dir: $appDir"

          $zipOut = Join-Path $releaseDir "$name-$version-win32-arm64.zip"
          Compress-Archive -Path "$appDir\*" -DestinationPath $zipOut -Force
          Write-Host "zip: $zipOut ($([math]::Round((Get-Item $zipOut).Length/1MB,1)) MB)"

          $setupDir = ".build\win32-arm64\system-setup"
          $setupExe = Get-ChildItem -Path $setupDir -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($setupExe) {
            $exeDest = Join-Path $releaseDir "$name-$version-win32-arm64.exe"
            Copy-Item $setupExe.FullName $exeDest -Force
            Write-Host "exe: $exeDest ($([math]::Round($setupExe.Length/1MB,1)) MB)"
          } else {
            Write-Host "::warning::Inno Setup .exe not found -- skipping"
          }

      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          $version = "${{ env.NI_VERSION }}"
          $name = "${{ env.NI_DISPLAY_NAME }}"
          $releaseDir = ".build\release"
          $msiDest = Join-Path $releaseDir "$name-$version-win32-arm64.msi"

          $appDir = Get-ChildItem -Path "..", "." -Depth 2 -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match "^(VSCode|$name)-win32-arm64$" } | Select-Object -First 1
          if (-not $appDir) { Write-Host "::warning::App directory not found -- .msi skipped"; exit 0 }

          $wixOut = ".build\wix-arm64"
          New-Item -ItemType Directory -Force -Path $wixOut | Out-Null
          $harvestedWxs = Join-Path $wixOut "NeuralInverseFiles.wxs"
          $msiTmp = Join-Path $wixOut "NeuralInverse.msi"

          & heat dir $appDir.FullName -nologo -srd -gg -sreg -cg NeuralInverseFiles -dr INSTALLFOLDER "-var:var.SourceDir" -out $harvestedWxs
          if ($LASTEXITCODE -ne 0) { Write-Host "::warning::heat failed -- .msi skipped"; exit 0 }
          & candle -nologo -arch arm64 "-dProductVersion=$version" "-dSourceDir=$($appDir.FullName)" "build\win32\NeuralInverse.wxs" $harvestedWxs -out "$wixOut\"
          if ($LASTEXITCODE -ne 0) { Write-Host "::warning::candle failed -- .msi skipped"; exit 0 }
          & light -nologo -ext WixUIExtension (Get-ChildItem $wixOut -Filter "*.wixobj").FullName -out $msiTmp -b $appDir.FullName
          if ($LASTEXITCODE -ne 0) { Write-Host "::warning::light failed -- .msi skipped"; exit 0 }

          if (Test-Path $msiTmp) {
            Copy-Item $msiTmp $msiDest -Force
            Write-Host "msi: $msiDest ($([math]::Round((Get-Item $msiDest).Length/1MB,1)) MB)"
          }

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem .build\release\ | Format-Table Name, Length

      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: .build/release/
          retention-days: 7

  ############################################################################
  #  GitHub Release + S3 Upload
  ############################################################################
  release:
    name: Publish GitHub Release + S3
    runs-on: ubuntu-latest
    needs: [build-windows-x64, build-windows-arm64]

    steps:
      - name: Set version
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Download all Windows artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: windows-*
          path: release/
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh release/

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          VERSION="${{ env.NI_VERSION }}"
          aws s3 cp release/ s3://neuralinverse/ce/${VERSION}/ --recursive
          aws s3 cp release/ s3://neuralinverse/ce/latest/ --recursive
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"version\": \"${VERSION}\", \"date\": \"${DATE}\"}" | \
            aws s3 cp - s3://neuralinverse/ce/latest.json --content-type application/json
          echo "Uploaded to s3://neuralinverse/ce/${VERSION}/ and s3://neuralinverse/ce/latest/"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.NI_VERSION }}-ce"
          name: "NeuralInverse Community Edition v${{ env.NI_VERSION }} -- Windows"
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.msi
          body: |
            ## NeuralInverse Community Edition v${{ env.NI_VERSION }} -- Windows

            Free, open-source AI IDE for everyone.

            ### Windows x64 (Intel / AMD)

            | File | Use case |
            |---|---|
            | `NeuralInverse-*-win32-x64.exe` | Standard install wizard |
            | `NeuralInverse-*-win32-x64.msi` | Enterprise / Group Policy / SCCM |

            ### Windows arm64 (Surface / Snapdragon)

            | File | Use case |
            |---|---|
            | `NeuralInverse-*-win32-arm64.exe` | Standard install wizard |
            | `NeuralInverse-*-win32-arm64.msi` | Enterprise / Group Policy / SCCM |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
