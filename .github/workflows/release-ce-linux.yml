################################################################################
#  NeuralInverse Community Edition — Linux Release (GitHub Actions)
#
#  Linux x64    -> .deb  .rpm  .AppImage  .tar.gz   (Intel / AMD)
#  Linux arm64  -> .deb  .tar.gz                    (AWS Graviton / RPi 4-5)
#  Linux armhf  -> .deb  .tar.gz                    (RPi 3 / embedded)
#
#  Trigger: manual workflow_dispatch only
#
#  Secrets required:
#    AWS_ACCESS_KEY_ID
#    AWS_SECRET_ACCESS_KEY
################################################################################

name: CE Linux Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

env:
  NI_DISPLAY_NAME: "NeuralInverse"
  NI_QUALITY: "stable"

jobs:
  ############################################################################
  #  Linux x64  (.deb + .rpm + .AppImage + .tar.gz)
  ############################################################################
  build-linux-x64:
    name: Linux x64 (.deb + .rpm + .AppImage + .tar.gz)
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: community-edition
          fetch-depth: 1

      - name: Set version
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            fakeroot libsecret-1-dev libkrb5-dev \
            libx11-dev libxkbfile-dev libnss3 \
            desktop-file-utils rpm \
            libgtk-3-0 libxss1 || \
          sudo apt-get install -y libgtk-3-0t64 || true
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true

      - name: Install appimagetool
        run: |
          curl -sLo /tmp/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool

      - name: Install dependencies
        run: |
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000
          npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React UI
        run: npm run buildreact

      - name: Compile TypeScript (production)
        run: node node_modules/.bin/gulp compile-build-without-mangling
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Minify (produces out-vscode-min/)
        run: node node_modules/.bin/gulp minify-vscode
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Compile extensions (syntax + language features)
        run: node node_modules/.bin/gulp compile-extensions-build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Package Linux x64
        run: node node_modules/.bin/gulp vscode-linux-x64-min-ci
        env:
          VSCODE_QUALITY: ${{ env.NI_QUALITY }}

      - name: Debug -- list gulp output
        run: |
          echo "=== Files in workspace root ==="
          ls -la
          echo "=== Files in ../ ==="
          ls -la ../
          echo "=== App directories produced by gulp ==="
          find . .. -maxdepth 3 -type d \( -name "VSCode-linux-*" -o -name "NeuralInverse-linux-*" \) 2>/dev/null || echo "none found"

      - name: Create packages from app directory
        run: |
          VERSION="${{ env.NI_VERSION }}"
          NAME="${{ env.NI_DISPLAY_NAME }}"
          NAME_LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
          RDIR=".build/release"
          mkdir -p "$RDIR"

          APP_DIR=$(find . .. -maxdepth 3 -type d \( -name "VSCode-linux-x64" -o -name "${NAME}-linux-x64" \) 2>/dev/null | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "::error::Could not find linux-x64 app directory -- aborting"
            exit 1
          fi
          echo "Found app dir: $APP_DIR"

          tar czf "$RDIR/${NAME}-${VERSION}-linux-x64.tar.gz" \
            -C "$(dirname "$APP_DIR")" "$(basename "$APP_DIR")"
          echo "tar.gz: $(du -sh "$RDIR/${NAME}-${VERSION}-linux-x64.tar.gz" | cut -f1)"

          DEB_TMP=$(mktemp -d)
          mkdir -p "$DEB_TMP/usr/share/${NAME_LOWER}"
          cp -rp "$APP_DIR/." "$DEB_TMP/usr/share/${NAME_LOWER}/"
          mkdir -p "$DEB_TMP/usr/bin"
          ln -sf "/usr/share/${NAME_LOWER}/${NAME_LOWER}" "$DEB_TMP/usr/bin/${NAME_LOWER}" 2>/dev/null || \
            ln -sf "/usr/share/${NAME_LOWER}/code" "$DEB_TMP/usr/bin/${NAME_LOWER}" 2>/dev/null || true
          mkdir -p "$DEB_TMP/usr/share/applications"
          cat > "$DEB_TMP/usr/share/applications/${NAME_LOWER}.desktop" << DESKTOP
          [Desktop Entry]
          Name=${NAME}
          Comment=AI-Native IDE for regulated and critical software development
          Exec=/usr/share/${NAME_LOWER}/${NAME_LOWER} %F
          Icon=${NAME_LOWER}
          Type=Application
          Categories=Development;IDE;
          StartupWMClass=${NAME}
          DESKTOP
          cat > "$DEB_TMP/usr/share/applications/${NAME_LOWER}-url-handler.desktop" << DESKTOP
          [Desktop Entry]
          Name=${NAME} - URL Handler
          Exec=/usr/share/${NAME_LOWER}/${NAME_LOWER} --open-url -- %U
          Icon=${NAME_LOWER}
          Type=Application
          NoDisplay=true
          Categories=Development;IDE;
          StartupWMClass=${NAME}
          MimeType=x-scheme-handler/${NAME_LOWER};
          DESKTOP
          mkdir -p "$DEB_TMP/DEBIAN"
          cat > "$DEB_TMP/DEBIAN/postinst" << POSTINST
          #!/bin/sh
          set -e
          update-desktop-database /usr/share/applications 2>/dev/null || true
          xdg-mime default ${NAME_LOWER}-url-handler.desktop x-scheme-handler/${NAME_LOWER} 2>/dev/null || true
          POSTINST
          chmod 0755 "$DEB_TMP/DEBIAN/postinst"
          cat > "$DEB_TMP/DEBIAN/control" << CTRL
          Package: ${NAME_LOWER}
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: NeuralInverse <support@neuralinverse.ai>
          Description: NeuralInverse Community Edition
           Free, open-source AI IDE for everyone.
          CTRL
          fakeroot dpkg-deb --build "$DEB_TMP" "$RDIR/${NAME}-${VERSION}-linux-x64.deb"
          echo "deb: $(du -sh "$RDIR/${NAME}-${VERSION}-linux-x64.deb" | cut -f1)"
          rm -rf "$DEB_TMP"

          APPDIR_TMP=$(mktemp -d)
          mkdir -p "$APPDIR_TMP/usr/bin" "$APPDIR_TMP/usr/share/${NAME_LOWER}"
          cp -rp "$APP_DIR/." "$APPDIR_TMP/usr/share/${NAME_LOWER}/"
          ln -sf "../share/${NAME_LOWER}/${NAME_LOWER}" "$APPDIR_TMP/usr/bin/${NAME_LOWER}" 2>/dev/null || \
            ln -sf "../share/${NAME_LOWER}/code" "$APPDIR_TMP/usr/bin/${NAME_LOWER}" 2>/dev/null || true
          cat > "$APPDIR_TMP/${NAME_LOWER}.desktop" << DESKTOP
          [Desktop Entry]
          Name=${NAME}
          Exec=${NAME_LOWER}
          Icon=${NAME_LOWER}
          Type=Application
          Categories=Development;
          MimeType=x-scheme-handler/${NAME_LOWER};
          DESKTOP
          if [ -f "resources/linux/code.png" ]; then
            cp "resources/linux/code.png" "$APPDIR_TMP/${NAME_LOWER}.png"
          fi
          cat > "$APPDIR_TMP/AppRun" << APPRUN
          #!/bin/sh
          SELF=\$(readlink -f "\$0")
          HERE=\${SELF%/*}
          export PATH="\${HERE}/usr/bin:\${PATH}"
          EXEC="\${HERE}/usr/share/${NAME_LOWER}/${NAME_LOWER}"
          [ -x "\$EXEC" ] || EXEC="\${HERE}/usr/share/${NAME_LOWER}/code"
          exec "\$EXEC" "\$@"
          APPRUN
          chmod +x "$APPDIR_TMP/AppRun"
          ARCH=x86_64 appimagetool --appimage-extract-and-run \
            "$APPDIR_TMP" "$RDIR/${NAME}-${VERSION}-linux-x64.AppImage" \
            && echo "AppImage: $(du -sh "$RDIR/${NAME}-${VERSION}-linux-x64.AppImage" | cut -f1)" \
            || echo "::warning::AppImage creation failed -- skipping"
          rm -rf "$APPDIR_TMP"

      - name: List artifacts
        run: ls -lh .build/release/

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: .build/release/
          retention-days: 7

  ############################################################################
  #  Linux arm64  (.deb + .tar.gz)
  ############################################################################
  build-linux-arm64:
    name: Linux arm64 (.deb + .tar.gz)
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: community-edition
          fetch-depth: 1

      - name: Set version
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
