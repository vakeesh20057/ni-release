      - name: Create packages from app directory
        run: |
          VERSION="${{ env.NI_VERSION }}"
          NAME="${{ env.NI_DISPLAY_NAME }}"
          NAME_LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
          RDIR=".build/release"
          mkdir -p "$RDIR"

          APP_DIR=$(find . .. -maxdepth 3 -type d \( -name "VSCode-linux-armhf" -o -name "${NAME}-linux-armhf" \) 2>/dev/null | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "::error::Could not find linux-armhf app directory -- aborting"
            exit 1
          fi
          echo "Found app dir: $APP_DIR"

          tar czf "$RDIR/${NAME}-${VERSION}-linux-armhf.tar.gz" \
            -C "$(dirname "$APP_DIR")" "$(basename "$APP_DIR")"
