        with:
          name: linux-armhf
          path: .build/release/
          retention-days: 7

  ############################################################################
  #  GitHub Release + S3 Upload  (all Linux architectures)
  ############################################################################
  release:
    name: Publish GitHub Release + S3
    runs-on: ubuntu-latest
    needs: [build-linux-x64, build-linux-arm64, build-linux-armhf]

    steps:
      - name: Set version
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Download all Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: linux-*
          path: release/
          merge-multiple: true

      - name: List release artifacts
        run: mkdir -p release/ && ls -lh release/

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          VERSION="${{ env.NI_VERSION }}"
          aws s3 cp release/ s3://neuralinverse/ce/${VERSION}/ --recursive
          aws s3 cp release/ s3://neuralinverse/ce/latest/ --recursive
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"version\": \"${VERSION}\", \"date\": \"${DATE}\"}" | \
            aws s3 cp - s3://neuralinverse/ce/latest.json --content-type application/json
          echo "Uploaded to s3://neuralinverse/ce/${VERSION}/ and s3://neuralinverse/ce/latest/"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.NI_VERSION }}-ce"
          name: "NeuralInverse Community Edition v${{ env.NI_VERSION }} -- Linux"
          draft: false
          prerelease: false
          files: release/*
          body: |
            ## NeuralInverse Community Edition v${{ env.NI_VERSION }} -- Linux

            Free, open-source AI IDE for everyone.

            ### Linux x64 (Intel / AMD)

            | File | Use case |
            |---|---|
            | `NeuralInverse-*-linux-x64.deb` | Ubuntu / Debian -- `sudo dpkg -i` |
            | `NeuralInverse-*-linux-x64.AppImage` | Portable -- `chmod +x` and run |
            | `NeuralInverse-*-linux-x64.tar.gz` | Manual / custom install |

            ### Linux arm64 (AWS Graviton / Raspberry Pi 4-5)

            | File | Use case |
            |---|---|
            | `NeuralInverse-*-linux-arm64.deb` | Ubuntu / Debian -- `sudo dpkg -i` |
            | `NeuralInverse-*-linux-arm64.tar.gz` | Manual / custom install |

            ### Linux armhf (Raspberry Pi 3 / embedded)

            | File | Use case |
            |---|---|
            | `NeuralInverse-*-linux-armhf.deb` | Raspbian / Debian -- `sudo dpkg -i` |
            | `NeuralInverse-*-linux-armhf.tar.gz` | Manual / custom install |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
