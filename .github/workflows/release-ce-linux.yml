      - name: Package Linux arm64
        run: node node_modules/.bin/gulp vscode-linux-arm64-min-ci
        env:
          VSCODE_QUALITY: ${{ env.NI_QUALITY }}
          npm_config_arch: arm64

      - name: Create packages from app directory
        run: |
          VERSION="${{ env.NI_VERSION }}"
          NAME="${{ env.NI_DISPLAY_NAME }}"
          NAME_LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
          RDIR=".build/release"
          mkdir -p "$RDIR"

          APP_DIR=$(find . .. -maxdepth 3 -type d \( -name "VSCode-linux-arm64" -o -name "${NAME}-linux-arm64" \) 2>/dev/null | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "::error::Could not find linux-arm64 app directory -- aborting"
            exit 1
          fi
          echo "Found app dir: $APP_DIR"

          tar czf "$RDIR/${NAME}-${VERSION}-linux-arm64.tar.gz" \
            -C "$(dirname "$APP_DIR")" "$(basename "$APP_DIR")"
          echo "tar.gz: $(du -sh "$RDIR/${NAME}-${VERSION}-linux-arm64.tar.gz" | cut -f1)"

          DEB_TMP=$(mktemp -d)
          mkdir -p "$DEB_TMP/usr/share/${NAME_LOWER}"
          cp -rp "$APP_DIR/." "$DEB_TMP/usr/share/${NAME_LOWER}/"
          mkdir -p "$DEB_TMP/usr/bin"
          ln -sf "/usr/share/${NAME_LOWER}/${NAME_LOWER}" "$DEB_TMP/usr/bin/${NAME_LOWER}" 2>/dev/null || \
            ln -sf "/usr/share/${NAME_LOWER}/code" "$DEB_TMP/usr/bin/${NAME_LOWER}" 2>/dev/null || true
          mkdir -p "$DEB_TMP/DEBIAN"
          cat > "$DEB_TMP/DEBIAN/control" << CTRL
          Package: ${NAME_LOWER}
          Version: ${VERSION}
          Architecture: arm64
          Maintainer: NeuralInverse <support@neuralinverse.ai>
          Description: NeuralInverse Community Edition
           Free, open-source AI IDE for everyone.
          CTRL
          fakeroot dpkg-deb --build "$DEB_TMP" "$RDIR/${NAME}-${VERSION}-linux-arm64.deb"
          echo "deb: $(du -sh "$RDIR/${NAME}-${VERSION}-linux-arm64.deb" | cut -f1)"
          rm -rf "$DEB_TMP"

      - name: List artifacts
        run: ls -lh .build/release/

      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: .build/release/
          retention-days: 7

  ############################################################################
  #  Linux armhf  (.deb + .tar.gz)  -- Raspberry Pi 3 / embedded
  ############################################################################
  build-linux-armhf:
    name: Linux armhf (.deb + .tar.gz)
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: community-edition
          fetch-depth: 1

      - name: Set version
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install system dependencies + armhf cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            fakeroot libsecret-1-dev libkrb5-dev \
            libx11-dev libxkbfile-dev libnss3 \
            desktop-file-utils \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf binutils-arm-linux-gnueabihf
          sudo apt-get install -y libgtk-3-0 libxss1 || sudo apt-get install -y libgtk-3-0t64 || true

      - name: Install dependencies
        run: |
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000
          npm ci
        env:
          npm_config_arch: armhf
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React UI
        run: npm run buildreact

      - name: Compile TypeScript (production)
        run: node node_modules/.bin/gulp compile-build-without-mangling
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Minify (produces out-vscode-min/)
        run: node node_modules/.bin/gulp minify-vscode
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

