################################################################################
#  NeuralInverse IDE — macOS x64 Release (GitHub Actions)
#
#  macOS x64 → .dmg  .pkg  .zip   (Intel Mac)
#
#  Trigger: push a git tag matching v*-x64  (e.g. v1.3.7-x64)
#  This keeps x64 builds independent from arm64 (release-macos.yml).
#
#  GITHUB_TOKEN is built-in — no setup needed.
################################################################################

name: macOS x64 Release

on:
  push:
    tags:
      - "v*-x64"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.3.9)"
        required: true
        default: "1.3.9"

permissions:
  contents: write

env:
  NI_DISPLAY_NAME: "NeuralInverse"
  NI_BUNDLE_ID: "com.neuralinverse.code"
  NI_QUALITY: "stable"

jobs:
  ############################################################################
  #  macOS x64  (Intel — macos-13 runner, 14 GB RAM)
  ############################################################################
  build-macos-x64:
    name: macOS x64 (.dmg + .pkg + .zip)
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            RAW="${GITHUB_REF_NAME#v}"
            echo "NI_VERSION=${RAW%-x64}" >> "$GITHUB_ENV"
          fi

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000
          npm ci
        env:
          npm_config_arch: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React UI
        run: npm run buildreact

      - name: Compile TypeScript (production)
        run: node node_modules/.bin/gulp compile-build-without-mangling
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Minify (produces out-vscode-min/)
        run: node node_modules/.bin/gulp minify-vscode
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Compile extensions (syntax + language features)
        run: node node_modules/.bin/gulp compile-extensions-build
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Package macOS x64
        run: node node_modules/.bin/gulp vscode-darwin-x64-min-ci
        env:
          VSCODE_QUALITY: ${{ env.NI_QUALITY }}
          npm_config_arch: x64

      - name: Collect artifacts (.zip + .dmg + .pkg)
        run: |
          set -e
          RELEASE_DIR=".build/release"
          mkdir -p "$RELEASE_DIR"
          VERSION="${{ env.NI_VERSION }}"
          NAME="${{ env.NI_DISPLAY_NAME }}"

          # Find the .app bundle produced by gulp
          APP_BUNDLE=$(find . .. -maxdepth 5 \
            -name "${NAME}.app" -type d \
            -not -path "*/node_modules/*" \
            2>/dev/null | head -1)

          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::Could not find ${NAME}.app — aborting"
            exit 1
          fi
          echo "Found: $APP_BUNDLE"

          # .zip — proper archive preserving macOS metadata
          ZIP_OUT="$RELEASE_DIR/${NAME}-${VERSION}-darwin-x64.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_BUNDLE" "$ZIP_OUT"
          echo "zip: $ZIP_OUT ($(du -sh "$ZIP_OUT" | cut -f1))"

          # .dmg — drag-to-Applications disk image
          DMG_OUT="$RELEASE_DIR/${NAME}-${VERSION}-darwin-x64.dmg"
          hdiutil create \
            -volname "${NAME}" \
            -srcfolder "$APP_BUNDLE" \
            -ov -format UDZO \
            "$DMG_OUT"
          echo "dmg: $DMG_OUT ($(du -sh "$DMG_OUT" | cut -f1))"

          # .pkg — enterprise / MDM installer
          PKG_OUT="$RELEASE_DIR/${NAME}-${VERSION}-darwin-x64.pkg"
          pkgbuild \
            --component "$APP_BUNDLE" \
            --identifier "${{ env.NI_BUNDLE_ID }}" \
            --version "${VERSION}" \
            --install-location "/Applications" \
            "$PKG_OUT"
          echo "pkg: $PKG_OUT ($(du -sh "$PKG_OUT" | cut -f1))"

      - name: List artifacts
        run: ls -lh .build/release/

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: .build/release/
          retention-days: 7

  ############################################################################
  #  GitHub Release  (macOS x64)
  ############################################################################
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos-x64]

    steps:
      - name: Set version from tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            RAW="${GITHUB_REF_NAME#v}"
            echo "NI_VERSION=${RAW%-x64}" >> "$GITHUB_ENV"
          fi

      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: release/

      - name: List release artifacts
        run: ls -lh release/

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          VERSION="${{ env.NI_VERSION }}"
          # Versioned folder
          aws s3 cp release/ s3://neuralinverse/${VERSION}/ --recursive
          # Latest folder (always overwritten)
          aws s3 cp release/ s3://neuralinverse/latest/ --recursive
          echo "Uploaded to s3://neuralinverse/${VERSION}/ and s3://neuralinverse/latest/"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NeuralInverse IDE v${{ env.NI_VERSION }} — macOS x64 (Intel)"
          draft: false
          prerelease: false
          files: release/*
          body: |
            ## NeuralInverse IDE v${{ env.NI_VERSION }} — macOS x64 (Intel)

            AI-Native IDE for regulated and critical software development.

            ---

            ### macOS x64 (Intel Mac)

            | File | Use case |
            |---|---|
            | `NeuralInverse-*-darwin-x64.dmg` | Standard install — drag to Applications |
            | `NeuralInverse-*-darwin-x64.pkg` | Enterprise / MDM / Jamf deployment |
            | `NeuralInverse-*-darwin-x64.zip` | Developers / CI environments |

            For Apple Silicon (M1/M2/M3) see the [arm64 release](../../releases/latest).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
