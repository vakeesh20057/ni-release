################################################################################
#  NeuralInverse Community Edition — macOS Release (GitHub Actions)
#
#  macOS arm64  -> .dmg  .pkg  .zip   (Apple Silicon)
#  macOS x64    -> .dmg  .pkg  .zip   (Intel Mac)
#
#  Trigger: manual workflow_dispatch only
#
#  Secrets required:
#    AWS_ACCESS_KEY_ID
#    AWS_SECRET_ACCESS_KEY
################################################################################

name: CE macOS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

env:
  NI_DISPLAY_NAME: "NeuralInverse"
  NI_BUNDLE_ID: "com.neuralinverse.code"
  NI_QUALITY: "stable"

jobs:
  ############################################################################
  #  macOS arm64  (Apple Silicon — macos-14 runner)
  ############################################################################
  build-macos-arm64:
    name: macOS arm64 (.dmg + .pkg + .zip)
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set version
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000
          npm ci
        env:
          npm_config_arch: arm64
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React UI
        run: npm run buildreact

      - name: Compile TypeScript (production)
        run: node node_modules/.bin/gulp compile-build-without-mangling
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Minify (produces out-vscode-min/)
        run: node node_modules/.bin/gulp minify-vscode
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Compile extensions (syntax + language features)
        run: node node_modules/.bin/gulp compile-extensions-build
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Package macOS arm64
        run: node node_modules/.bin/gulp vscode-darwin-arm64-min-ci
        env:
          VSCODE_QUALITY: ${{ env.NI_QUALITY }}
          npm_config_arch: arm64

      - name: Collect artifacts (.zip + .dmg + .pkg)
        run: |
          set -e
          RELEASE_DIR=".build/release"
          mkdir -p "$RELEASE_DIR"
          VERSION="${{ env.NI_VERSION }}"
          NAME="${{ env.NI_DISPLAY_NAME }}"

          APP_BUNDLE=$(find . .. -maxdepth 5 \
            -name "${NAME}.app" -type d \
            -not -path "*/node_modules/*" \
            2>/dev/null | head -1)

          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::Could not find ${NAME}.app -- aborting"
            exit 1
          fi
          echo "Found: $APP_BUNDLE"

          ZIP_OUT="$RELEASE_DIR/${NAME}-${VERSION}-darwin-arm64.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_BUNDLE" "$ZIP_OUT"
          echo "zip: $ZIP_OUT ($(du -sh "$ZIP_OUT" | cut -f1))"

          DMG_OUT="$RELEASE_DIR/${NAME}-${VERSION}-darwin-arm64.dmg"
          hdiutil create -volname "${NAME}" -srcfolder "$APP_BUNDLE" -ov -format UDZO "$DMG_OUT"
          echo "dmg: $DMG_OUT ($(du -sh "$DMG_OUT" | cut -f1))"

          PKG_OUT="$RELEASE_DIR/${NAME}-${VERSION}-darwin-arm64.pkg"
          pkgbuild \
            --component "$APP_BUNDLE" \
            --identifier "${{ env.NI_BUNDLE_ID }}" \
            --version "${VERSION}" \
            --install-location "/Applications" \
            "$PKG_OUT"
          echo "pkg: $PKG_OUT ($(du -sh "$PKG_OUT" | cut -f1))"

      - name: List artifacts
        run: ls -lh .build/release/

      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: .build/release/
          retention-days: 7

  ############################################################################
  #  macOS x64  (Intel — macos-13 runner)
  ############################################################################
  build-macos-x64:
    name: macOS x64 (.dmg + .pkg + .zip)
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set version
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Install Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React UI
        run: npm run buildreact

      - name: Compile TypeScript (production)
        run: node node_modules/.bin/gulp compile-build-without-mangling
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Minify (produces out-vscode-min/)
        run: node node_modules/.bin/gulp minify-vscode
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Compile extensions (syntax + language features)
        run: node node_modules/.bin/gulp compile-extensions-build
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Package macOS x64
        run: node node_modules/.bin/gulp vscode-darwin-x64-min-ci
        env:
          VSCODE_QUALITY: ${{ env.NI_QUALITY }}
          npm_config_arch: x64

      - name: Collect artifacts (.zip + .dmg + .pkg)
        run: |
          set -e
          RELEASE_DIR=".build/release"
          mkdir -p "$RELEASE_DIR"
          VERSION="${{ env.NI_VERSION }}"
          NAME="${{ env.NI_DISPLAY_NAME }}"

          APP_BUNDLE=$(find . .. -maxdepth 5 \
            -name "${NAME}.app" -type d \
            -not -path "*/node_modules/*" \
            2>/dev/null | head -1)

          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::Could not find ${NAME}.app"
            exit 1
          fi

          ZIP_OUT="$RELEASE_DIR/${NAME}-${VERSION}-darwin-x64.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_BUNDLE" "$ZIP_OUT"

          DMG_OUT="$RELEASE_DIR/${NAME}-${VERSION}-darwin-x64.dmg"
          hdiutil create -volname "${NAME}" -srcfolder "$APP_BUNDLE" -ov -format UDZO "$DMG_OUT"

          PKG_OUT="$RELEASE_DIR/${NAME}-${VERSION}-darwin-x64.pkg"
          pkgbuild \
            --component "$APP_BUNDLE" \
            --identifier "${{ env.NI_BUNDLE_ID }}" \
            --version "${VERSION}" \
            --install-location "/Applications" \
            "$PKG_OUT"

      - name: List artifacts
        run: ls -lh .build/release/

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: .build/release/
          retention-days: 7

  ############################################################################
  #  GitHub Release + S3 Upload
  ############################################################################
  release:
    name: Publish GitHub Release + S3
    runs-on: ubuntu-latest
    needs: [build-macos-arm64, build-macos-x64]

    steps:
      - name: Set version
        run: echo "NI_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Download all macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          path: release/
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh release/

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          VERSION="${{ env.NI_VERSION }}"
          aws s3 cp release/ s3://neuralinverse/ce/${VERSION}/ --recursive
          aws s3 cp release/ s3://neuralinverse/ce/latest/ --recursive
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"version\": \"${VERSION}\", \"date\": \"${DATE}\"}" | \
            aws s3 cp - s3://neuralinverse/ce/latest.json --content-type application/json
          echo "Uploaded to s3://neuralinverse/ce/${VERSION}/ and updated ce/latest.json"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.NI_VERSION }}-ce"
          name: "NeuralInverse Community Edition v${{ env.NI_VERSION }} -- macOS"
          draft: false
          prerelease: false
          files: release/*
          body: |
            ## NeuralInverse Community Edition v${{ env.NI_VERSION }} -- macOS

            Free, open-source AI IDE for everyone.

            ### macOS arm64 (Apple Silicon)

            | File | Use case |
            |---|---|
            | `NeuralInverse-*-darwin-arm64.dmg` | Standard install |
            | `NeuralInverse-*-darwin-arm64.pkg` | Enterprise / MDM / Jamf |
            | `NeuralInverse-*-darwin-arm64.zip` | Developers / CI |

            ### macOS x64 (Intel)

            | File | Use case |
            |---|---|
            | `NeuralInverse-*-darwin-x64.dmg` | Standard install |
            | `NeuralInverse-*-darwin-x64.pkg` | Enterprise / MDM / Jamf |
            | `NeuralInverse-*-darwin-x64.zip` | Developers / CI |

            > **First install on macOS:** If macOS blocks the app, run:
            > ```
            > sudo xattr -rd com.apple.quarantine /Applications/NeuralInverse.app
            > ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
