name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run compile 2>&1 | tail -20
        continue-on-error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run eslint 2>&1 | tail -30
        continue-on-error: true

  check-non-ascii:
    name: Check non-ASCII in source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for non-ASCII characters in TS/JS string literals
        run: |
          python3 -c "
          import sys, os, glob
          files = glob.glob('src/**/*.ts', recursive=True) + glob.glob('src/**/*.js', recursive=True)
          violations = []
          for path in files:
              lines = open(path, encoding='utf-8', errors='ignore').read().split('\n')
              for i, line in enumerate(lines, 1):
                  stripped = line.lstrip()
                  if stripped.startswith('//') or stripped.startswith('*') or stripped.startswith('/*'):
                      continue
                  for j, ch in enumerate(line):
                      if ord(ch) > 127:
                          if '//' in line[:j]: break
                          violations.append(f'{path}:{i}: U+{ord(ch):04X} {repr(ch)}  {line.strip()[:80]}')
                          break
          if violations:
              print('Non-ASCII characters found in source files (will break release build):')
              for v in violations:
                  print(v)
              sys.exit(1)
          else:
              print('No non-ASCII violations found.')
          "
