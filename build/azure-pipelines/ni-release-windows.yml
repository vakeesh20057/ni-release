################################################################################
#  STAGE 3 — GitHub Release  (Windows formats only)
################################################################################
  - stage: GitHub_Release_Windows
    displayName: "NeuralInverse — Publish Windows GitHub Release"
    dependsOn:
      - Build_Windows_x64
      - Build_Windows_arm64
    condition: succeeded()
    pool:
      vmImage: "ubuntu-latest"
    jobs:
      - job: publish_windows_release
        displayName: "Create Windows GitHub Release"
        steps:
          - checkout: none

          - task: AzureCLI@2
            displayName: "Download Windows artifacts from Azure Blob"
            inputs:
              azureSubscription: "azure-neuralinverse"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                DEST="$(Build.ArtifactStagingDirectory)/release"
                mkdir -p "$DEST"
                az storage blob download-batch \
                  --account-name "$(NI_STORAGE_ACCOUNT)" \
                  --account-key "$(NI_STORAGE_KEY)" \
                  --source "releases" \
                  --destination "$DEST" \
                  --pattern "$(NI_VERSION)/*"
                mv "$DEST/$(NI_VERSION)/"* "$DEST/" 2>/dev/null || true
                rmdir "$DEST/$(NI_VERSION)" 2>/dev/null || true
                ls -lh "$DEST/"

          - task: GitHubRelease@1
            displayName: "Publish Windows builds to GitHub Releases"
            inputs:
              gitHubConnection: "github-neuralinverse"
              repositoryName: "$(NI_GITHUB_REPO)"
              action: "create"
              tag: "v$(NI_VERSION)-windows"
              title: "NeuralInverse IDE v$(NI_VERSION) — Windows"
              releaseNotesSource: "inline"
              releaseNotes: |
                ## NeuralInverse IDE v$(NI_VERSION) — Windows

                All Windows architectures. For macOS and Linux see [v$(NI_VERSION)](../../releases/tag/v$(NI_VERSION)).

                ---

                ### Windows x64 (Intel / AMD)

                | File | Use case |
                |---|---|
                | `NeuralInverse-*-win32-x64.exe` | Standard install wizard |
                | `NeuralInverse-*-win32-x64.msi` | Enterprise / Group Policy / SCCM — `msiexec /i NeuralInverse.msi /quiet` |
                | `NeuralInverse-*-win32-x64.zip` | Developers / CI environments |

                ### Windows arm64 (Surface Pro X / Snapdragon)

                | File | Use case |
                |---|---|
                | `NeuralInverse-*-win32-arm64.exe` | Standard install wizard |
                | `NeuralInverse-*-win32-arm64.msi` | Enterprise / Group Policy / SCCM — `msiexec /i NeuralInverse.msi /quiet` |
                | `NeuralInverse-*-win32-arm64.zip` | Developers / CI environments |
              assets: "$(Build.ArtifactStagingDirectory)/release/*"
              isDraft: false
              isPreRelease: false
              addChangeLog: false
