################################################################################
#  STAGE 5 — GitHub Release  (all ARM formats)
################################################################################
  - stage: GitHub_Release_ARM
    displayName: "NeuralInverse — Publish ARM GitHub Release"
    dependsOn:
      - Build_macOS_x64
      - Build_Windows_arm64
      - Build_Linux_arm64
      - Build_Linux_armhf
    condition: succeeded()
    pool:
      vmImage: "ubuntu-latest"
    jobs:
      - job: publish_arm_release
        displayName: "Create ARM GitHub Release"
        steps:
          - checkout: none

          - task: AzureCLI@2
            displayName: "Download all ARM artifacts from Azure Blob"
            inputs:
              azureSubscription: "azure-neuralinverse"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                DEST="$(Build.ArtifactStagingDirectory)/release"
                mkdir -p "$DEST"
                az storage blob download-batch \
                  --account-name "$(NI_STORAGE_ACCOUNT)" \
                  --account-key "$(NI_STORAGE_KEY)" \
                  --source "releases-arm" \
                  --destination "$DEST" \
                  --pattern "$(NI_VERSION)/*"
                mv "$DEST/$(NI_VERSION)/"* "$DEST/" 2>/dev/null || true
                rmdir "$DEST/$(NI_VERSION)" 2>/dev/null || true
                ls -lh "$DEST/"

          - task: GitHubRelease@1
            displayName: "Publish ARM builds to GitHub Releases"
            inputs:
              gitHubConnection: "github-neuralinverse"
              repositoryName: "$(NI_GITHUB_REPO)"
              action: "create"
              tag: "v$(NI_VERSION)-arm"
              title: "NeuralInverse IDE v$(NI_VERSION) — ARM builds"
              releaseNotesSource: "inline"
              releaseNotes: |
                ## NeuralInverse IDE v$(NI_VERSION) — ARM / Alternative Architectures

                ARM and Intel builds. For the main x64 release see [v$(NI_VERSION)](../../releases/tag/v$(NI_VERSION)).

                ---

                ### macOS x64 (Intel Mac)

                | File | Use case |
                |---|---|
                | `NeuralInverse-*-darwin-x64.dmg` | Standard install — drag to Applications |
                | `NeuralInverse-*-darwin-x64.pkg` | Enterprise / MDM / Jamf deployment |
                | `NeuralInverse-*-darwin-x64.zip` | Developers / CI environments |

                ### Windows arm64 (Surface Pro X / Snapdragon)

                | File | Use case |
                |---|---|
                | `NeuralInverse-*-win32-arm64.exe` | Standard install wizard |
                | `NeuralInverse-*-win32-arm64.zip` | Developers / CI environments |

                ### Linux arm64 (AWS Graviton / Raspberry Pi 4-5)

                | File | Use case |
                |---|---|
                | `NeuralInverse-*-linux-arm64.deb` | Ubuntu / Debian — `sudo dpkg -i` |
                | `NeuralInverse-*-linux-arm64.tar.gz` | Manual / custom install |

                ### Linux armhf (Raspberry Pi 3 / embedded)

                | File | Use case |
                |---|---|
                | `NeuralInverse-*-linux-armhf.deb` | Raspbian / Debian armhf — `sudo dpkg -i` |
                | `NeuralInverse-*-linux-armhf.tar.gz` | Manual / custom install |
              assets: "$(Build.ArtifactStagingDirectory)/release/*"
              isDraft: false
              isPreRelease: false
              addChangeLog: false
